services:
  - type: web
    name: researchmate-backend
    env: python
    buildCommand: |
      pip install --upgrade pip
      pip install greenlet==2.0.2 --only-binary=:all:
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false