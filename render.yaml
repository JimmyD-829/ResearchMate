services:
  - type: web
    name: researchmate-backend
    env: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt --only-binary=:all:
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false